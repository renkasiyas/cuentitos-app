name: cuentitos
description: Cuentos personalizados para tu hijo/a
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  dio: ^5.7.0
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_secure_storage: ^9.2.0
  just_audio: ^0.9.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  webview_flutter: ^4.10.0
  google_sign_in: ^6.2.0
  go_router: ^14.6.0
  connectivity_plus: ^6.1.0
  share_plus: ^10.0.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  drift_dev: ^2.22.0
  mocktail: ^1.0.0
